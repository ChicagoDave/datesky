# HTTP vhost for nomare.net — redirects all traffic to HTTPS.
# Pair file: nomare.net-le-ssl.conf (HTTPS reverse proxy to Next.js on :3003).
# Owner: Infrastructure bounded context.
#
# Install:
#   sudo cp scripts/apache/nomare.net.conf /etc/apache2/sites-available/
#   sudo a2ensite nomare.net
#   sudo systemctl reload apache2
<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    ServerName nomare.net

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =nomare.net
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
