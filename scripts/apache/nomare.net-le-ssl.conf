# HTTPS vhost for nomare.net — reverse proxy to Next.js on :3003.
# Pair file: nomare.net.conf (HTTP redirect to HTTPS).
# Owner: Infrastructure bounded context.
#
# Install (after `sudo certbot certonly --apache -d nomare.net` has placed the
# cert at /etc/letsencrypt/live/nomare.net/):
#   sudo cp scripts/apache/nomare.net-le-ssl.conf /etc/apache2/sites-available/
#   sudo a2ensite nomare.net-le-ssl
#   sudo systemctl reload apache2
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName nomare.net
    ServerAdmin webmaster@localhost

    # Reverse proxy to Next.js
    ProxyPreserveHost On
    ProxyPass / http://localhost:3003/
    ProxyPassReverse / http://localhost:3003/

    # WebSocket support (for Next.js HMR in dev)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule /(.*) ws://localhost:3003/$1 [P,L]

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/nomare.net-error.log
    CustomLog ${APACHE_LOG_DIR}/nomare.net-access.log combined

    SSLCertificateFile /etc/letsencrypt/live/nomare.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/nomare.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
