# HTTPS vhost for datesky.app — permanent redirect to nomare.net.
# Pair file: existing /etc/apache2/sites-available/datesky.app.conf (HTTP→HTTPS
# redirect for datesky.app) is unchanged so certbot --apache can still renew
# the datesky.app cert.
# Owner: Infrastructure bounded context.
#
# Background: Phase 3 hard-cutover OAuth (ADR-0002, Decision B) made datesky.app's
# OAuth endpoints unreachable as a valid client_id. Phase 4 Step A brought
# nomare.net live as the canonical host. This file completes Decision C by
# 301-redirecting every datesky.app path to its nomare.net equivalent,
# preserving query strings via the trailing slash on the target.
#
# Install:
#   sudo cp scripts/apache/datesky.app-le-ssl.conf /etc/apache2/sites-available/
#   sudo systemctl reload apache2
#
# Verify:
#   curl -I https://datesky.app/about         # → 301 https://nomare.net/about
#   curl -L https://datesky.app/jwks.json     # follows to nomare.net/jwks.json
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName datesky.app
    ServerAdmin webmaster@localhost

    Redirect permanent / https://nomare.net/

    ErrorLog ${APACHE_LOG_DIR}/datesky.app-error.log
    CustomLog ${APACHE_LOG_DIR}/datesky.app-access.log combined

    SSLCertificateFile /etc/letsencrypt/live/datesky.app/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/datesky.app/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
